<svg width="140" height="120" viewBox="0 0 140 120"
  xmlns="http://www.w3.org/2000/svg"
  shape-rendering="crispEdges">

  <style>
    .eye {
      transform-box: fill-box;
      transform-origin: center;
      animation: blink 3s steps(1,end) infinite;
    }

    @keyframes blink {
      0%, 92%, 100% {
        transform: scaleY(1);
      }

      95% {
        transform: scaleY(0.08);
      }
    }
  </style>

  <!-- Left whiskers -->
  <rect x="28" y="52" width="18" height="2" fill="#111" />
  <rect x="24" y="58" width="22" height="2" fill="#111" />
  <rect x="28" y="64" width="18" height="2" fill="#111" />

  <!-- Right whiskers -->
  <rect x="94" y="52" width="18" height="2" fill="#111" />
  <rect x="94" y="58" width="22" height="2" fill="#111" />
  <rect x="94" y="64" width="18" height="2" fill="#111" />

  <!-- Tail -->
  <rect x="92" y="78" width="10" height="22" fill="#111" />
  <rect x="102" y="88" width="10" height="10" fill="#111" />
  <rect x="112" y="78" width="10" height="20" fill="#111" />
  <rect x="108" y="74" width="14" height="8" fill="#111" />

  <!-- Body -->
  <rect x="40" y="34" width="52" height="56" fill="#111" />

  <!-- Feet -->
  <rect x="44" y="86" width="14" height="10" fill="#111" />
  <rect x="74" y="86" width="14" height="10" fill="#111" />

  <!-- Left Ear -->
  <rect x="42" y="16" width="8" height="18" fill="#111" />
  <rect x="50" y="10" width="8" height="24" fill="#111" />

  <!-- Right Ear -->
  <rect x="74" y="10" width="8" height="24" fill="#111" />
  <rect x="82" y="16" width="8" height="18" fill="#111" />

  <!-- Head -->
  <rect x="38" y="22" width="56" height="42" fill="#111" />

  <!-- Left Eye -->
  <g class="eye">
    <rect x="50" y="38" width="12" height="12" fill="#fff" />
    <rect x="54" y="42" width="4" height="4" fill="#111" />
  </g>

  <!-- Right Eye -->
  <g class="eye">
    <rect x="70" y="38" width="12" height="12" fill="#fff" />
    <rect x="74" y="42" width="4" height="4" fill="#111" />
  </g>

</svg>